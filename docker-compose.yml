services:
  api:
    build:
      context: .
    container_name: trpg-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/data/data.db
    stop_grace_period: 60s
    volumes:
      - ./data:/app/data
    expose:
      - "8000"
    networks:
      - web

networks:
  web:
    external: true
    name: web
