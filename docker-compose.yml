services:
  api:
    build:
      context: .
    container_name: trpg-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/data/data.db
    stop_grace_period: 60s
    volumes:
      - ./data:/app/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - web

networks:
  web:
    external: true
    name: web
