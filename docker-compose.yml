services:
  api:
    build:
      context: .
    container_name: trpg-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/data/data.db
    volumes:
      - ./data:/app/data
    expose:
      - "8000"

  caddy:
    image: caddy:2
    container_name: trpg-caddy
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
